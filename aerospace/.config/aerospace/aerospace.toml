# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout settings
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Trigger SketchyBar reload whenever a monitor is connected or disconnected
#exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --reload']

# Refresh SketchyBar on AeroSpace startup
after-startup-command = [
  'exec-and-forget sketchybar --reload',
  'exec-and-forget borders',
]

# Gaps between windows
[gaps]
inner.horizontal = 10
inner.vertical =   10
outer.left =       5
outer.right =      5
outer.bottom =     5
outer.top =        [ { monitor."built-in" = 10 }, 40 ]

[mode.main.binding]
# Focus windows with alt + h/j/k/l
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
cmd-enter = 'exec-and-forget open -a Ghostty'
cmd-shift-j = 'exec-and-forget open -a Finder'
alt-slash = 'layout tiles vertical horizontal'

# Move windows with alt + shift + h/j/k/l
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces: alt + 1-9 to switch
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# Move to workspace: alt + shift + 1-9
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Utilities
alt-tab = 'workspace-back-and-forth'
alt-f = 'fullscreen'
alt-s = 'layout v_accordion'
alt-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# Force specific apps to always open on specific spaces
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = "move-node-to-workspace 1"
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = "move-node-to-workspace 5"
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = "move-node-to-workspace 2"

# Always floating apps
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Bitwarden'
run = 'layout floating'

# Always tiling apps
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'layout tiling'

[workspace-to-monitor-force-assignment]
1 = ['main', 1]
2 = ['main', 1]
3 = ['main', 1]
4 = ['main', 1]
5 = [2, 'main']
6 = [2, 'main']
7 = [2, 'main']
8 = [2, 'main']
9 = [2, 'main']
